<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>农大玄鉴 · CAU校园服务平台</title><style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f9fafb;color:#2c3e50;line-height:1.7}
.container{max-width:1100px;margin:0 auto;padding:0 20px}
nav{background:white;box-shadow:0 2px 16px rgba(0,0,0,.06);position:sticky;top:0;z-index:100;border-bottom:2px solid #e8f5e9}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 20px}
.logo{font-size:1.5em;font-weight:800;color:#2e7d32;letter-spacing:2px}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{cursor:pointer;text-decoration:none;color:#555;font-weight:500;font-size:.95em;padding:6px 12px;border-radius:8px;transition:.2s}
.nav-links a:hover,.nav-links a.active{background:#e8f5e9;color:#2e7d32}
.btn-join{background:linear-gradient(135deg,#f9a825,#f57f17);color:white!important;padding:8px 20px!important;border-radius:20px!important;font-weight:700!important}
.hamburger{display:none;font-size:1.6em;cursor:pointer;color:#2e7d32}
section{display:none;padding:40px 0;min-height:70vh}section.active{display:block}
.card{background:white;border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.05);transition:.2s;border:1px solid #f0f0f0}
.card:hover{box-shadow:0 8px 30px rgba(0,0,0,.1);transform:translateY(-2px)}
.card-grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.hero{text-align:center;padding:60px 20px 40px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-80px;right:-80px;width:200px;height:200px;border:2px solid #c8e6c9;border-radius:50%;opacity:.4}
.hero h1{font-size:3em;color:#1b5e20;margin-bottom:8px;font-weight:900;letter-spacing:4px}
.hero .subtitle{font-size:1.15em;color:#666}.hero .tags{font-size:.9em;color:#999;margin-bottom:30px}
.btn{display:inline-block;padding:10px 24px;border-radius:24px;font-weight:600;cursor:pointer;border:none;font-size:.95em;transition:.2s;text-decoration:none}
.btn-primary{background:#43a047;color:white}.btn-primary:hover{background:#2e7d32}
.btn-gold{background:linear-gradient(135deg,#f9a825,#f57f17);color:white}
.btn-outline{border:2px solid #43a047;color:#43a047;background:transparent}
.btn-sm{padding:4px 12px;font-size:.8em;border-radius:12px}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:8px 20px;border-radius:20px;border:1px solid #ddd;background:white;cursor:pointer;font-size:.9em;transition:.2s}
.tab-btn.active,.tab-btn:hover{background:#43a047;color:white;border-color:#43a047}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:white;border-radius:20px;padding:32px;max-width:500px;width:90%;max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:16px;color:#1b5e20}.modal label{display:block;margin:12px 0 4px;font-weight:600;font-size:.9em}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:.95em}
.modal textarea{min-height:80px;resize:vertical}.modal .btn{margin-top:16px;width:100%}
.sec-title{text-align:center;font-size:1.8em;color:#1b5e20;margin-bottom:8px;font-weight:800}
.sec-sub{text-align:center;color:#888;margin-bottom:32px;font-size:.95em}
.countdown{text-align:center;padding:16px;background:#e8f5e9;border-radius:12px;font-size:1.1em;color:#2e7d32;font-weight:600;margin-bottom:16px}
.map-img{width:100%;max-height:500px;object-fit:contain;border-radius:16px;cursor:pointer;border:2px solid #e8f5e9}
footer{text-align:center;padding:24px;color:#999;font-size:.85em;border-top:1px solid #e8f5e9;margin-top:40px}
.tips-box{background:#fff8e1;border-left:4px solid #f9a825;padding:16px 20px;border-radius:0 12px 12px 0;margin:16px 0;font-size:.95em}
.donate-box{text-align:center;padding:24px;background:#fefefe;border-radius:16px;border:2px dashed #e8f5e9;margin:24px 0}
.donate-box img{max-width:200px;border-radius:12px}
@media(max-width:768px){.nav-links{display:none;flex-direction:column;position:absolute;top:100%;left:0;width:100%;background:white;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.1)}.nav-links.open{display:flex}.hamburger{display:block}.hero h1{font-size:2em}}</style></head>
<body>
